<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run State Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.9);
      --panel-2: rgba(30, 41, 59, 0.72);
      --border: rgba(148, 163, 184, 0.18);
      --text: #e5eefb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-2: #22d3ee;
      --green: #22c55e;
      --yellow: #f59e0b;
      --red: #ef4444;
      --purple: #a78bfa;
      --shadow: 0 18px 50px rgba(2, 6, 23, 0.32);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(96, 165, 250, 0.12), transparent 28%),
        radial-gradient(circle at right, rgba(34, 211, 238, 0.08), transparent 24%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 24px;
      margin-bottom: 20px;
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    h1, h2 {
      margin: 0;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 {
      font-size: clamp(1.8rem, 2vw, 2.4rem);
    }

    h2 {
      font-size: 1.05rem;
      margin-bottom: 14px;
    }

    .subtitle,
    .meta-line,
    .small {
      color: var(--muted);
    }

    .subtitle {
      margin-top: 8px;
      max-width: 72ch;
      line-height: 1.5;
    }

    .status-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      font-size: 0.92rem;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      display: inline-block;
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .stats-grid {
      grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
      margin-bottom: 20px;
    }

    .two-col {
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.9fr);
      align-items: start;
      margin-bottom: 20px;
    }

    .panel {
      padding: 20px;
    }

    .stat-card {
      padding: 18px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 16px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .stat-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .progress-wrap {
      margin-top: 8px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .progress-track {
      width: 100%;
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(51, 65, 85, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 240ms ease;
    }

    .timeline-list {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .timeline-row {
      display: grid;
      grid-template-columns: 70px 140px minmax(0, 1fr) 84px;
      gap: 12px;
      align-items: center;
    }

    .timeline-label,
    .timeline-duration {
      font-size: 0.92rem;
    }

    .timeline-topic {
      color: var(--muted);
      font-size: 0.85rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .timeline-track {
      position: relative;
      height: 18px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.1);
      overflow: hidden;
    }

    .timeline-bar {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 999px;
    }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .legend span {
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .mini-list {
      display: grid;
      gap: 10px;
    }

    .mini-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.1);
    }

    .mini-item .label {
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.94rem;
    }

    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      text-align: left;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    tbody tr:hover {
      background: rgba(30, 41, 59, 0.3);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      border: 1px solid rgba(148, 163, 184, 0.15);
      text-transform: capitalize;
      white-space: nowrap;
    }

    .prompt {
      max-width: 640px;
      color: var(--muted);
      line-height: 1.4;
    }

    .empty {
      padding: 24px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed rgba(148, 163, 184, 0.18);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.45);
    }

    .tavily-content {
      display: grid;
      gap: 16px;
    }

    .tavily-card {
      padding: 16px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: grid;
      gap: 10px;
    }

    .tavily-key-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .tavily-key-label {
      font-weight: 600;
      color: var(--accent);
    }

    .tavily-key-preview {
      font-family: ui-monospace, monospace;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .tavily-active-badge {
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .tavily-usage-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .tavily-usage-bar-wrap {
      flex: 1;
      min-width: 180px;
    }

    .tavily-usage-stats {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .tavily-usage-stats strong {
      color: var(--text);
    }

    @media (max-width: 1120px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 840px) {
      .timeline-row {
        grid-template-columns: 58px minmax(0, 1fr);
      }

      .timeline-meta,
      .timeline-duration {
        display: none;
      }
    }

    @media (max-width: 720px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tbody tr {
        padding: 12px 0;
        border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      }

      td {
        border: none;
        padding: 6px 0;
      }

      td::before {
        content: attr(data-label);
        display: block;
        color: var(--muted);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1>Run State Dashboard</h1>
          <div class="subtitle">
            Read-only dashboard for `run_state.json` with live updates, progress tracking, runtime stats, and a batch timeline.
          </div>
        </div>
        <div class="status-strip" id="status-strip"></div>
      </div>
    </section>

    <section class="grid stats-grid" id="stats-grid"></section>

    <section class="panel" id="tavily-panel" style="margin-bottom: 20px;">
      <h2>Tavily API Usage</h2>
      <div class="small" id="tavily-subtitle" style="margin-bottom: 12px;">Polling usage every 10s…</div>
      <div id="tavily-content" class="tavily-content"></div>
    </section>

    <section class="grid two-col">
      <div class="panel">
        <h2>Progress</h2>
        <div class="progress-wrap">
          <div class="progress-head">
            <div id="progress-label" class="meta-line">Waiting for state...</div>
            <div id="eta-label" class="meta-line"></div>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="small" id="progress-subtitle" style="margin-top: 10px;"></div>
        </div>
      </div>

      <div class="panel stack">
        <div>
          <h2>Interesting Bits</h2>
          <div class="mini-list" id="interesting-list"></div>
        </div>
      </div>
    </section>

    <section class="panel" style="margin-bottom: 20px;">
      <h2>Timeline</h2>
      <div class="small" id="timeline-caption" style="margin-bottom: 10px;"></div>
      <div class="timeline-list" id="timeline-list"></div>
      <div class="legend">
        <span><i class="dot" style="background: var(--green);"></i>Completed</span>
        <span><i class="dot" style="background: var(--yellow);"></i>Running</span>
        <span><i class="dot" style="background: var(--red);"></i>Failed / Interrupted</span>
        <span><i class="dot" style="background: var(--purple);"></i>Other</span>
      </div>
    </section>

    <section class="panel">
      <h2>Runs</h2>
      <div id="runs-table-wrap"></div>
    </section>
  </div>

  <script>
    const els = {
      statusStrip: document.getElementById("status-strip"),
      statsGrid: document.getElementById("stats-grid"),
      tavilySubtitle: document.getElementById("tavily-subtitle"),
      tavilyContent: document.getElementById("tavily-content"),
      progressLabel: document.getElementById("progress-label"),
      etaLabel: document.getElementById("eta-label"),
      progressFill: document.getElementById("progress-fill"),
      progressSubtitle: document.getElementById("progress-subtitle"),
      interestingList: document.getElementById("interesting-list"),
      timelineCaption: document.getElementById("timeline-caption"),
      timelineList: document.getElementById("timeline-list"),
      runsTableWrap: document.getElementById("runs-table-wrap"),
    };

    let refreshTimer = null;
    let currentState = null;
    const FULL_BATCH_TARGET = 100;

    function parseDate(value) {
      if (!value) return null;
      const ms = Date.parse(value);
      return Number.isNaN(ms) ? null : ms;
    }

    function formatDuration(ms) {
      if (!Number.isFinite(ms) || ms < 0) return "n/a";
      const totalSeconds = Math.round(ms / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      if (hours > 0) return `${hours}h ${minutes}m`;
      if (minutes > 0) return `${minutes}m ${seconds}s`;
      return `${seconds}s`;
    }

    function formatDate(value) {
      const ms = parseDate(value);
      if (!ms) return "n/a";
      return new Date(ms).toLocaleString();
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes) || bytes < 0) return "n/a";
      const units = ["B", "KB", "MB", "GB"];
      let value = bytes;
      let unitIndex = 0;
      while (value >= 1024 && unitIndex < units.length - 1) {
        value /= 1024;
        unitIndex += 1;
      }
      return `${value.toFixed(value >= 100 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    function avg(values) {
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function escapeHtml(text) {
      return String(text ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function statusColor(status) {
      switch (status) {
        case "completed":
          return "var(--green)";
        case "running":
          return "var(--yellow)";
        case "failed":
        case "interrupted":
          return "var(--red)";
        default:
          return "var(--purple)";
      }
    }

    function getRuns(state) {
      const now = Date.now();
      return Object.entries(state?.runs ?? {})
        .map(([id, run]) => {
          const startedMs = parseDate(run.started_at);
          const finishedMs = parseDate(run.finished_at);
          const status = run.status || "unknown";
          const effectiveEndMs = finishedMs ?? (status === "running" ? now : startedMs);
          const durationMs = startedMs && effectiveEndMs ? Math.max(effectiveEndMs - startedMs, 0) : null;
          return {
            id,
            ...run,
            status,
            startedMs,
            finishedMs,
            effectiveEndMs,
            durationMs,
            reportBytes: Number(run.report_bytes || 0),
          };
        })
        .sort((a, b) => Number(a.id) - Number(b.id));
    }

    function buildStats(runs) {
      const completed = runs.filter((run) => run.status === "completed");
      const running = runs.filter((run) => run.status === "running");
      const failed = runs.filter((run) => run.status === "failed");
      const interrupted = runs.filter((run) => run.status === "interrupted");
      const finished = runs.filter((run) => ["completed", "failed", "interrupted"].includes(run.status));
      const completedDurations = completed.map((run) => run.durationMs).filter(Boolean);
      const avgCompletedMs = avg(completedDurations);
      const totalReportBytes = runs.reduce((sum, run) => sum + (run.reportBytes || 0), 0);
      const longestCompleted = [...completed]
        .filter((run) => Number.isFinite(run.durationMs))
        .sort((a, b) => b.durationMs - a.durationMs)[0] || null;
      const shortestCompleted = [...completed]
        .filter((run) => Number.isFinite(run.durationMs))
        .sort((a, b) => a.durationMs - b.durationMs)[0] || null;

      const topics = {};
      for (const run of runs) {
        const key = run.topic || "Unknown";
        topics[key] = (topics[key] || 0) + 1;
      }
      const topTopic = Object.entries(topics).sort((a, b) => b[1] - a[1])[0] || null;

      return {
        total: runs.length,
        completedCount: completed.length,
        runningCount: running.length,
        failedCount: failed.length,
        interruptedCount: interrupted.length,
        finishedCount: finished.length,
        avgCompletedMs,
        totalReportBytes,
        longestCompleted,
        shortestCompleted,
        topTopic,
        running,
      };
    }

    function estimateRemainingMs(stats, targetTotal = stats.total) {
      if (!targetTotal) return null;
      if (stats.finishedCount >= targetTotal) return 0;
      if (!stats.avgCompletedMs) return null;

      const remainingTracked = Math.max(targetTotal - stats.finishedCount - stats.runningCount, 0);
      const runningRemaining = stats.running.reduce((sum, run) => {
        if (!Number.isFinite(run.durationMs)) return sum + stats.avgCompletedMs;
        return sum + Math.max(stats.avgCompletedMs - run.durationMs, stats.avgCompletedMs * 0.12);
      }, 0);

      return runningRemaining + (remainingTracked * stats.avgCompletedMs);
    }

    function renderStatusStrip(state, stats) {
      const updatedAt = state?.updated_at ? formatDate(state.updated_at) : "n/a";
      const connected = [
        `<span class="pill"><i class="dot" style="background: var(--accent-2);"></i>Live updates enabled</span>`,
        `<span class="pill"><i class="dot" style="background: ${stats.runningCount ? "var(--yellow)" : "var(--green)"};"></i>${stats.runningCount ? "Batch active" : "No active run"}</span>`,
        `<span class="pill"><i class="dot" style="background: var(--accent);"></i>Last state update: ${escapeHtml(updatedAt)}</span>`,
      ];
      els.statusStrip.innerHTML = connected.join("");
    }

    function renderStatCards(stats, trackedEtaMs, fullBatchEtaMs, targetTotal) {
      const cards = [
        {
          label: "Observed Runs",
          value: stats.total,
          sub: `${stats.completedCount} completed, ${stats.runningCount} running`,
        },
        {
          label: "Average Runtime",
          value: stats.avgCompletedMs ? formatDuration(stats.avgCompletedMs) : "n/a",
          sub: "Across completed runs",
        },
        {
          label: `ETA To ${targetTotal}`,
          value: fullBatchEtaMs == null ? "n/a" : fullBatchEtaMs === 0 ? "Done" : formatDuration(fullBatchEtaMs),
          sub: fullBatchEtaMs && fullBatchEtaMs > 0 ? `ETA ${new Date(Date.now() + fullBatchEtaMs).toLocaleTimeString()}` : "Projected from completed runs",
        },
        {
          label: "Current Batch ETA",
          value: trackedEtaMs == null ? "n/a" : trackedEtaMs === 0 ? "Done" : formatDuration(trackedEtaMs),
          sub: "For runs already present in run_state.json",
        },
      ];

      els.statsGrid.innerHTML = cards.map((card) => `
        <div class="stat-card">
          <div class="stat-label">${escapeHtml(card.label)}</div>
          <div class="stat-value">${escapeHtml(String(card.value))}</div>
          <div class="stat-sub">${escapeHtml(card.sub)}</div>
        </div>
      `).join("");
    }

    function renderProgress(stats, fullBatchEtaMs, targetTotal) {
      const doneCount = stats.finishedCount;
      const progressPct = targetTotal ? (doneCount / targetTotal) * 100 : 0;
      els.progressFill.style.width = `${progressPct.toFixed(1)}%`;
      els.progressLabel.textContent = targetTotal
        ? `${doneCount} of ${targetTotal} target runs finished`
        : "No runs tracked yet";
      els.progressSubtitle.textContent = targetTotal
        ? `${stats.total} observed in state file, ${stats.completedCount} completed, ${stats.failedCount} failed, ${stats.interruptedCount} interrupted, ${stats.runningCount} currently running`
        : "Waiting for the batch runner to write state.";
      els.etaLabel.textContent = fullBatchEtaMs == null
        ? "ETA: need completed runs"
        : fullBatchEtaMs === 0
          ? `ETA: ${targetTotal}-run batch complete`
          : `ETA to ${targetTotal}: ${formatDuration(fullBatchEtaMs)}`;
    }

    function renderInterestingBits(stats) {
      const items = [
        {
          label: "Longest completed run",
          value: stats.longestCompleted ? `#${stats.longestCompleted.id} in ${formatDuration(stats.longestCompleted.durationMs)}` : "n/a",
        },
        {
          label: "Fastest completed run",
          value: stats.shortestCompleted ? `#${stats.shortestCompleted.id} in ${formatDuration(stats.shortestCompleted.durationMs)}` : "n/a",
        },
        {
          label: "Top topic",
          value: stats.topTopic ? `${stats.topTopic[0]} (${stats.topTopic[1]})` : "n/a",
        },
        {
          label: "Failure count",
          value: `${stats.failedCount + stats.interruptedCount}`,
        },
      ];

      els.interestingList.innerHTML = items.map((item) => `
        <div class="mini-item">
          <div class="label">${escapeHtml(item.label)}</div>
          <div>${escapeHtml(item.value)}</div>
        </div>
      `).join("");
    }

    function renderTimeline(runs) {
      if (!runs.length) {
        els.timelineCaption.textContent = "No runs available yet.";
        els.timelineList.innerHTML = `<div class="empty">Timeline will appear once the state file contains runs.</div>`;
        return;
      }

      const starts = runs.map((run) => run.startedMs).filter(Boolean);
      const ends = runs.map((run) => run.effectiveEndMs).filter(Boolean);
      const minStart = Math.min(...starts);
      const maxEnd = Math.max(...ends);
      const span = Math.max(maxEnd - minStart, 1);

      els.timelineCaption.textContent = `${new Date(minStart).toLocaleString()} -> ${new Date(maxEnd).toLocaleString()}`;
      els.timelineList.innerHTML = runs.map((run) => {
        const left = run.startedMs ? ((run.startedMs - minStart) / span) * 100 : 0;
        const width = run.startedMs && run.effectiveEndMs
          ? Math.max(((run.effectiveEndMs - run.startedMs) / span) * 100, 0.8)
          : 1.2;
        return `
          <div class="timeline-row">
            <div class="timeline-label">#${escapeHtml(run.id)}</div>
            <div class="timeline-meta">
              <div>${escapeHtml(run.status)}</div>
              <div class="timeline-topic">${escapeHtml(run.topic || "Unknown topic")}</div>
            </div>
            <div class="timeline-track" title="${escapeHtml(run.prompt || "")}">
              <div
                class="timeline-bar"
                style="left: ${left.toFixed(2)}%; width: ${width.toFixed(2)}%; background: ${statusColor(run.status)};"
              ></div>
            </div>
            <div class="timeline-duration">${escapeHtml(formatDuration(run.durationMs))}</div>
          </div>
        `;
      }).join("");
    }

    function renderRunsTable(runs) {
      if (!runs.length) {
        els.runsTableWrap.innerHTML = `<div class="empty">No runs yet. Waiting for \`run_state.json\`.</div>`;
        return;
      }

      els.runsTableWrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Status</th>
              <th>Topic</th>
              <th>Duration</th>
              <th>Report</th>
              <th>Prompt</th>
            </tr>
          </thead>
          <tbody>
            ${runs.map((run) => `
              <tr>
                <td data-label="ID">#${escapeHtml(run.id)}</td>
                <td data-label="Status">
                  <span class="status-badge">
                    <i class="dot" style="background: ${statusColor(run.status)};"></i>
                    ${escapeHtml(run.status)}
                  </span>
                </td>
                <td data-label="Topic">${escapeHtml(run.topic || "Unknown")}</td>
                <td data-label="Duration">${escapeHtml(formatDuration(run.durationMs))}</td>
                <td data-label="Report">${escapeHtml(formatBytes(run.reportBytes))}</td>
                <td data-label="Prompt"><div class="prompt">${escapeHtml(run.prompt || "")}</div></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    async function loadState() {
      const response = await fetch(`/api/run-state?ts=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Failed to load state: ${response.status}`);
      }
      return response.json();
    }

    async function loadTavilyUsage() {
      try {
        const response = await fetch(`/api/tavily-usage?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) return null;
        return response.json();
      } catch {
        return null;
      }
    }

    function renderTavilyUsage(data) {
      if (!data) {
        els.tavilyContent.innerHTML = `<div class="empty">Unable to load Tavily usage. Ensure run_batch has started and api_keys.txt contains keys.</div>`;
        els.tavilySubtitle.textContent = "Last poll: failed";
        return;
      }
      if (data.error && data.active_key_label) {
        const extra = data.detail ? `<div class="small" style="margin-top:6px;">${escapeHtml(JSON.stringify(data.detail))}</div>` : "";
        els.tavilyContent.innerHTML = `<div class="empty">Tavily usage error for <strong>${escapeHtml(data.active_key_label)}</strong>: ${escapeHtml(data.error)}${extra}</div>`;
        els.tavilySubtitle.textContent = "Last poll: " + (data.refreshed_at ? new Date(data.refreshed_at).toLocaleTimeString() : "n/a");
        return;
      }
      if (data.error && !data.active_key_label) {
        els.tavilyContent.innerHTML = `<div class="empty">${escapeHtml(data.error || "No keys configured")}</div>`;
        els.tavilySubtitle.textContent = "Last poll: " + (data.refreshed_at ? new Date(data.refreshed_at).toLocaleTimeString() : "n/a");
        return;
      }
      const rawUsage = data.usage;
      const rawLimit = data.limit;
      const rawRemaining = data.remaining;

      const hasUsage = rawUsage !== null && rawUsage !== undefined;
      const hasLimit = rawLimit !== null && rawLimit !== undefined;
      const hasRemaining = rawRemaining !== null && rawRemaining !== undefined;

      const usage = hasUsage ? rawUsage : 0;
      const pct = hasUsage && hasLimit && rawLimit > 0 ? Math.min(100, (usage / rawLimit) * 100) : 0;
      const remainingForColor = hasRemaining ? rawRemaining : 999_999;
      const barColor = remainingForColor <= 20 ? "var(--red)" : remainingForColor <= 50 ? "var(--yellow)" : "var(--green)";

      const usageText = hasUsage ? String(rawUsage) : "—";
      const limitText = hasUsage && !hasLimit ? "∞" : hasLimit ? String(rawLimit) : "—";
      const remainingText = hasRemaining ? String(rawRemaining) : "—";
      els.tavilySubtitle.textContent = "Last updated: " + (data.refreshed_at ? new Date(data.refreshed_at).toLocaleTimeString() : "n/a");
      els.tavilyContent.innerHTML = `
        <div class="tavily-card">
          <div class="tavily-key-row">
            <span class="tavily-key-label">${escapeHtml(data.active_key_label || "Unknown")}</span>
            <span class="tavily-active-badge">Active</span>
            <span class="tavily-key-preview">${escapeHtml(data.key_preview || "—")}</span>
          </div>
          <div class="tavily-usage-row">
            <div class="tavily-usage-bar-wrap">
              <div class="progress-track">
                <div class="progress-fill" style="width: ${pct.toFixed(1)}%; background: ${barColor};"></div>
              </div>
            </div>
            <div class="tavily-usage-stats">
              <strong>${usageText}</strong> / ${limitText} used
              · <strong>${remainingText}</strong> remaining
            </div>
          </div>
        </div>
      `;
    }

    function renderDashboard(state) {
      const runs = getRuns(state);
      const stats = buildStats(runs);
      const targetTotal = Math.max(FULL_BATCH_TARGET, stats.total);
      const trackedEtaMs = estimateRemainingMs(stats, stats.total);
      const fullBatchEtaMs = estimateRemainingMs(stats, targetTotal);
      renderStatusStrip(state, stats);
      renderStatCards(stats, trackedEtaMs, fullBatchEtaMs, targetTotal);
      renderProgress(stats, fullBatchEtaMs, targetTotal);
      renderInterestingBits(stats);
      renderTimeline(runs);
      renderRunsTable(runs);
    }

    async function refreshTavily() {
      const data = await loadTavilyUsage();
      renderTavilyUsage(data);
    }

    async function refreshDashboard() {
      try {
        const state = await loadState();
        currentState = state;
        renderDashboard(state);
        await refreshTavily();
      } catch (error) {
        console.error(error);
        els.runsTableWrap.innerHTML = `<div class="empty">${escapeHtml(error.message || "Failed to load dashboard data.")}</div>`;
      }
    }

    function scheduleRefresh() {
      if (refreshTimer) return;
      refreshTimer = setTimeout(async () => {
        refreshTimer = null;
        await refreshDashboard();
      }, 150);
    }

    function connectEvents() {
      const events = new EventSource("/events");
      events.addEventListener("updated", () => {
        scheduleRefresh();
        refreshTavily();
      });
      events.onerror = () => {
        setTimeout(connectEvents, 2000);
      };
    }

    refreshDashboard();
    connectEvents();
    setInterval(refreshTavily, 10000);
    setInterval(() => {
      if (!currentState) return;
      const hasRunning = Object.values(currentState.runs || {}).some((run) => run.status === "running");
      if (hasRunning) {
        renderDashboard(currentState);
      }
    }, 1000);
  </script>
</body>
</html>
